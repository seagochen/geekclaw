# GeekClaw Configuration
# ---------------------------------------------------------------------------
# Copy this file to ~/.geekclaw/configs/config.yaml and fill in your API keys.
# YAML format is used here so you can freely add your own comments.
# ---------------------------------------------------------------------------

agents:
  defaults:
    workspace: ~/.geekclaw/workspace
    # Access control is delegated to OS user permissions.
    # Set to true only if you need application-level sandboxing.
    restrict_to_workspace: false
    plugins_dir: ~/.geekclaw/plugins
    # Name of the model to use (must match a model_name in model_list below)
    # Leave empty if no default model is configured
    model_name: ""
    max_tokens: 8192
    temperature: 0.7
    max_tool_iterations: 20
    summarize_message_threshold: 20
    summarize_token_percent: 75

# ---------------------------------------------------------------------------
# Model list — add your AI providers here as needed.
# Each entry defines a model that can be used by agents.
# You can define multiple entries with the same model_name for load-balancing.
# ---------------------------------------------------------------------------
# Example:
# model_list:
#   - model_name: gpt4
#     model: openai/gpt-5.2
#     api_key: sk-your-openai-key
#     api_base: https://api.openai.com/v1
#
#   - model_name: claude-sonnet
#     model: anthropic/claude-sonnet-4.6
#     api_key: sk-ant-your-key
#     api_base: https://api.anthropic.com/v1
#
#   # Local model via Ollama
#   - model_name: local-llama
#     model: ollama/llama3
#     api_base: http://localhost:11434/v1
#     api_key: ollama
#
#   # Load-balanced example: two endpoints for the same model_name
#   - model_name: loadbalanced-gpt4
#     model: openai/gpt-5.2
#     api_key: sk-key1
#     api_base: https://api1.example.com/v1
#   - model_name: loadbalanced-gpt4
#     model: openai/gpt-5.2
#     api_key: sk-key2
#     api_base: https://api2.example.com/v1
model_list: []

# ---------------------------------------------------------------------------
# Channels — enable and configure messaging integrations.
# ---------------------------------------------------------------------------
channels:
  # Telegram Bot
  # 依赖: pip install httpx
  # 获取 token: 联系 @BotFather → /newbot
  # 获取 user_id: 发消息给 @userinfobot
  telegram:
    enabled: false
    token: YOUR_TELEGRAM_BOT_TOKEN
    base_url: ""        # 留空使用默认 api.telegram.org
    proxy: ""           # 可选: "http://127.0.0.1:7890"
    allow_from:
      - YOUR_TELEGRAM_USER_ID   # 数字 user ID
    reasoning_channel_id: ""

  discord:
    enabled: false
    token: YOUR_DISCORD_BOT_TOKEN
    proxy: ""
    allow_from: []
    group_trigger:
      mention_only: false
    reasoning_channel_id: ""

  qq:
    enabled: false
    app_id: YOUR_QQ_APP_ID
    app_secret: YOUR_QQ_APP_SECRET
    allow_from: []
    reasoning_channel_id: ""

  maixcam:
    enabled: false
    host: 0.0.0.0
    port: 18790
    allow_from: []
    reasoning_channel_id: ""

  whatsapp:
    enabled: false
    bridge_url: ws://localhost:3001
    use_native: false
    session_store_path: ""
    allow_from: []
    reasoning_channel_id: ""

  feishu:
    enabled: false
    app_id: ""
    app_secret: ""
    encrypt_key: ""
    verification_token: ""
    allow_from: []
    reasoning_channel_id: ""
    random_reaction_emoji: []

  dingtalk:
    enabled: false
    client_id: YOUR_CLIENT_ID
    client_secret: YOUR_CLIENT_SECRET
    allow_from: []
    reasoning_channel_id: ""

  slack:
    enabled: false
    bot_token: xoxb-YOUR-BOT-TOKEN
    app_token: xapp-YOUR-APP-TOKEN
    allow_from: []
    reasoning_channel_id: ""

  matrix:
    enabled: false
    homeserver: https://matrix.org
    user_id: "@your-bot:matrix.org"
    access_token: YOUR_MATRIX_ACCESS_TOKEN
    device_id: ""
    join_on_invite: true
    allow_from: []
    group_trigger:
      mention_only: true
    placeholder:
      enabled: true
      text: "Thinking... 💭"
    reasoning_channel_id: ""

  line:
    enabled: false
    channel_secret: YOUR_LINE_CHANNEL_SECRET
    channel_access_token: YOUR_LINE_CHANNEL_ACCESS_TOKEN
    webhook_path: /webhook/line
    allow_from: []
    reasoning_channel_id: ""

  onebot:
    enabled: false
    ws_url: ws://127.0.0.1:3001
    access_token: ""
    reconnect_interval: 5
    group_trigger_prefix: []
    allow_from: []
    reasoning_channel_id: ""

  # WeCom Bot — easier setup, supports group chats
  wecom:
    enabled: false
    token: YOUR_TOKEN
    encoding_aes_key: YOUR_43_CHAR_ENCODING_AES_KEY
    webhook_url: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY
    webhook_path: /webhook/wecom
    allow_from: []
    reply_timeout: 5
    reasoning_channel_id: ""

  # WeCom App (自建应用) — more features, proactive messaging, private chat only
  wecom_app:
    enabled: false
    corp_id: YOUR_CORP_ID
    corp_secret: YOUR_CORP_SECRET
    agent_id: 1000002
    token: YOUR_TOKEN
    encoding_aes_key: YOUR_43_CHAR_ENCODING_AES_KEY
    webhook_path: /webhook/wecom-app
    allow_from: []
    reply_timeout: 5
    reasoning_channel_id: ""

  # WeCom AI Bot (智能机器人) — official WeCom AI Bot integration
  wecom_aibot:
    enabled: false
    token: YOUR_TOKEN
    encoding_aes_key: YOUR_43_CHAR_ENCODING_AES_KEY
    webhook_path: /webhook/wecom-aibot
    max_steps: 10
    welcome_message: "Hello! I'm your AI assistant. How can I help you today?"
    reasoning_channel_id: ""

  irc:
    enabled: false
    server: irc.libera.chat:6697
    tls: true
    nick: mybot
    user: ""
    real_name: ""
    password: ""
    nickserv_password: ""
    sasl_user: ""
    sasl_password: ""
    channels:
      - "#mychannel"
    request_caps:
      - server-time
      - message-tags
    allow_from: []
    group_trigger:
      mention_only: true
    typing:
      enabled: false
    reasoning_channel_id: ""

# ---------------------------------------------------------------------------
# Tools
# ---------------------------------------------------------------------------
tools:
  allow_read_paths: []
  allow_write_paths: []

  web:
    enabled: true
    # DuckDuckGo is free and enabled by default
    duckduckgo:
      enabled: true
      max_results: 5
    brave:
      enabled: false
      api_key: YOUR_BRAVE_API_KEY
      max_results: 5
    tavily:
      enabled: false
      api_key: ""
      max_results: 5
    perplexity:
      enabled: false
      api_key: pplx-xxx
      max_results: 5
    searxng:
      enabled: false
      base_url: http://localhost:8888
      max_results: 5
    glm_search:
      enabled: false
      api_key: ""
      base_url: https://open.bigmodel.cn/api/paas/v4/web_search
      search_engine: search_std
      max_results: 5
    fetch_limit_bytes: 10485760  # 10 MB

  cron:
    enabled: true
    exec_timeout_minutes: 5

  exec:
    enabled: true
    allow_remote: true
    timeout_seconds: 60
    # exec_admins: list of sender IDs granted unrestricted shell access (bypass all guards)
    exec_admins: []
    custom_deny_patterns: []
    custom_allow_patterns: []

  skills:
    enabled: true
    registries:
      clawhub:
        enabled: true
        base_url: https://clawhub.ai
    max_concurrent_searches: 2
    search_cache:
      max_size: 50
      ttl_seconds: 300

  media_cleanup:
    enabled: true
    max_age_minutes: 30
    interval_minutes: 5

  # MCP (Model Context Protocol) server integrations
  mcp:
    enabled: false
    discovery:
      enabled: false
      ttl: 5
      max_search_results: 5
      use_bm25: true
      use_regex: false
    servers:
      context7:
        enabled: false
        type: http
        url: https://mcp.context7.com/mcp
        headers:
          CONTEXT7_API_KEY: ctx7sk-xx
      filesystem:
        enabled: false
        command: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
      github:
        enabled: false
        command: npx
        args: ["-y", "@modelcontextprotocol/server-github"]
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: YOUR_GITHUB_TOKEN

  append_file:
    enabled: true
  edit_file:
    enabled: true
  find_skills:
    enabled: true
  i2c:
    enabled: false   # hardware tool, Linux only
  install_skill:
    enabled: true
  list_dir:
    enabled: true
  message:
    enabled: true
  read_file:
    enabled: true
  send_file:
    enabled: true
  spawn:
    enabled: true
  spi:
    enabled: false   # hardware tool, Linux only
  subagent:
    enabled: true
  web_fetch:
    enabled: true
  write_file:
    enabled: true

# ---------------------------------------------------------------------------
# Gateway (web UI / API server)
# ---------------------------------------------------------------------------
gateway:
  host: 127.0.0.1
  port: 18790

voice:
  echo_transcription: false
